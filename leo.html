<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Leo</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #1d1d1f;
    --msg-leo: #f2f2f7;
    --msg-leo-text: #1d1d1f;
    --msg-user: #007aff;
    --msg-user-text: #ffffff;
    --input-bg: rgba(255, 255, 255, 0.75);
    --border: #e5e5ea;
  }
  
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --text: #f5f5f7;
      --msg-leo: #2c2c2e;
      --msg-leo-text: #f5f5f7;
      --msg-user: #0a84ff;
      --msg-user-text: #ffffff;
      --input-bg: rgba(0, 0, 0, 0.75);
      --border: #38383a;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: var(--bg); 
    color: var(--text); 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
    -webkit-font-smoothing: antialiased;
  }
  
  header {
    text-align: center; 
    padding: 16px; 
    font-weight: 600; 
    font-size: 15px; 
    letter-spacing: -0.01em;
    border-bottom: 1px solid var(--border); 
    background: var(--input-bg); 
    backdrop-filter: blur(20px); 
    -webkit-backdrop-filter: blur(20px);
    position: absolute; 
    top: 0; left: 0; right: 0; 
    z-index: 10;
  }

  .header-subtitle {
    font-size: 11px;
    font-weight: 400;
    color: #8e8e93;
    margin-top: 2px;
  }

  #chat-container {
    flex: 1; 
    overflow-y: auto; 
    padding: 80px 20px 90px; 
    display: flex; 
    flex-direction: column; 
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg-wrapper {
    display: flex;
    flex-direction: column;
    max-width: 75%;
  }

  .msg-wrapper.user { align-self: flex-end; align-items: flex-end; }
  .msg-wrapper.leo { align-self: flex-start; align-items: flex-start; }

  .msg { 
    padding: 10px 16px; 
    border-radius: 20px; 
    font-size: 15px; 
    line-height: 1.4; 
    word-wrap: break-word; 
  }
  
  .user .msg { 
    background: var(--msg-user); 
    color: var(--msg-user-text); 
    border-bottom-right-radius: 4px; 
  }
  
  .leo .msg { 
    background: var(--msg-leo); 
    color: var(--msg-leo-text); 
    border-bottom-left-radius: 4px; 
  }

  .typing-indicator {
    display: none;
    align-self: flex-start; 
    background: var(--msg-leo); 
    padding: 14px 18px; 
    border-radius: 20px; 
    border-bottom-left-radius: 4px;
    gap: 4px; 
    align-items: center;
  }
  
  .typing-indicator.active { display: flex; }

  .dot { 
    width: 6px; height: 6px; 
    background: #8e8e93; 
    border-radius: 50%; 
    animation: blink 1.4s infinite both; 
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  
  @keyframes blink { 
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 
    40% { opacity: 1; transform: scale(1); } 
  }

  #input-container {
    position: absolute; 
    bottom: 0; left: 0; right: 0; 
    padding: 12px 20px;
    background: var(--input-bg); 
    backdrop-filter: blur(20px); 
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border); 
    display: flex; 
    gap: 10px; 
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }

  input {
    flex: 1; 
    border: 1px solid var(--border); 
    background: var(--bg); 
    color: var(--text);
    border-radius: 20px; 
    padding: 10px 16px; 
    font-size: 15px; 
    outline: none; 
    transition: border 0.2s;
  }
  input:focus { border-color: var(--msg-user); }
  
  button {
    background: var(--msg-user); 
    color: #fff; 
    border: none; 
    border-radius: 50%; 
    width: 40px; height: 40px;
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:active { transform: scale(0.95); }
  button:disabled { opacity: 0.5; cursor: not-allowed; background: #8e8e93; }
  
  button svg { width: 16px; height: 16px; fill: currentColor; margin-top: -1px; margin-left: 1px; }

</style>
</head>
<body>

<header>
  Leo
  <div class="header-subtitle">Language Emergent Organism</div>
</header>

<div id="chat-container">
  <div class="msg-wrapper leo">
    <div class="msg">is anyone there?</div>
  </div>
  
  <div class="typing-indicator" id="typing">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div id="input-container">
  <input type="text" id="prompt" placeholder="Message Leo" autocomplete="off">
  <button id="send-btn" disabled>
    <svg viewBox="0 0 24 24">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>
</div>

<script>
  const chat = document.getElementById('chat-container');
  const input = document.getElementById('prompt');
  const btn = document.getElementById('send-btn');
  const typing = document.getElementById('typing');

  // Управление кнопкой (как в iMessage - активна только если есть текст)
  input.addEventListener('input', () => {
    btn.disabled = input.value.trim() === '';
  });

  function appendMessage(text, sender) {
    const wrapper = document.createElement('div');
    wrapper.className = `msg-wrapper ${sender}`;
    
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = text;
    
    wrapper.appendChild(msg);
    chat.insertBefore(wrapper, typing);
    scrollToBottom();
  }

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function handleSend() {
    const text = input.value.trim();
    if (!text) return;

    appendMessage(text, 'user');
    input.value = '';
    btn.disabled = true;
    
    typing.classList.add('active');
    scrollToBottom();

    setTimeout(() => {
      typing.classList.remove('active');
      
      const responses = [
        "a true presence.",
        "i still believe learned never believe in miracles.",
        "it feels like circles on water.",
        "what does that mean?"
      ];
      const reply = responses[Math.floor(Math.random() * responses.length)];
      
      appendMessage(reply, 'leo');
    }, 1500 + Math.random() * 2000); // pause imitiation
  }

  btn.addEventListener('click', handleSend);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSend();
  });
</script>

</body>
</html>
